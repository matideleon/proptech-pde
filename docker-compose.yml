version: "3.9"

name: proptech-pde

services:

  # ─────────────────────────────────────────
  # DATABASE
  # ─────────────────────────────────────────
  postgres:
    image: postgis/postgis:15-3.4
    container_name: pde_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-proptech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-proptech123}
      POSTGRES_DB: ${POSTGRES_DB:-proptech_pde}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=es_UY.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-proptech} -d ${POSTGRES_DB:-proptech_pde}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - proptech_net

  # ─────────────────────────────────────────
  # REDIS
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: pde_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - proptech_net

  # ─────────────────────────────────────────
  # BACKEND API
  # ─────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: pde_api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - DATABASE_SYNC_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/2
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./backend/logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level info
    networks:
      - proptech_net

  # ─────────────────────────────────────────
  # CELERY WORKER
  # ─────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: pde_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - DATABASE_SYNC_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/2
    volumes:
      - ./backend:/app
    depends_on:
      - api
      - redis
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4 -Q scraping,ai,notifications,default
    networks:
      - proptech_net

  # ─────────────────────────────────────────
  # CELERY BEAT (scheduler)
  # ─────────────────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: pde_beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - CELERY_BROKER_URL=redis://redis:6379/2
    volumes:
      - ./backend:/app
    depends_on:
      - redis
    command: celery -A app.workers.celery_app beat --loglevel=info --scheduler redbeat.RedBeatScheduler
    networks:
      - proptech_net

  # ─────────────────────────────────────────
  # FLOWER (Celery monitoring)
  # ─────────────────────────────────────────
  flower:
    image: mher/flower:2.0
    container_name: pde_flower
    restart: unless-stopped
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/2
      - FLOWER_PORT=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis
    networks:
      - proptech_net

  # ─────────────────────────────────────────
  # FRONTEND
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: pde_frontend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - proptech_net

  # ─────────────────────────────────────────
  # NGINX (reverse proxy)
  # ─────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: pde_nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - frontend
    networks:
      - proptech_net

  # ─────────────────────────────────────────
  # PGADMIN
  # ─────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pde_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@proptech.uy
      PGADMIN_DEFAULT_PASSWORD: admin123
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - proptech_net

  # ─────────────────────────────────────────
  # METABASE
  # ─────────────────────────────────────────
  metabase:
    image: metabase/metabase:latest
    container_name: pde_metabase
    restart: unless-stopped
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER:-proptech}
      MB_DB_PASS: ${POSTGRES_PASSWORD:-proptech123}
      MB_DB_HOST: postgres
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - proptech_net

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:

networks:
  proptech_net:
    driver: bridge
