# ============================================================
# PropTech PDE — Compose para EASYPANEL
# Easypanel (Traefik) maneja el ingreso HTTP/HTTPS + dominio + SSL.
# Por eso este compose NO incluye Nginx ni Certbot ni publica puertos:
# el dominio se mapea al servicio "frontend" (puerto 3000) desde la UI.
#
# En Easypanel: Proyecto → Servicio tipo "Compose" → este archivo.
# Luego: agregar dominio al servicio `frontend` (Easypanel pone el SSL).
# ============================================================

services:

  postgres:
    image: postgis/postgis:15-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-proptech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-proptech123}
      POSTGRES_DB: ${POSTGRES_DB:-proptech_pde}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-proptech}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./backend
      target: production
    restart: unless-stopped
    environment:
      APP_ENV: production
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-proptech}:${POSTGRES_PASSWORD:-proptech123}@postgres:5432/${POSTGRES_DB:-proptech_pde}
      DATABASE_SYNC_URL: postgresql://${POSTGRES_USER:-proptech}:${POSTGRES_PASSWORD:-proptech123}@postgres:5432/${POSTGRES_DB:-proptech_pde}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/2
      SECRET_KEY: ${SECRET_KEY:-this_is_a_placeholder_of_at_least_32_chars_x}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-this_is_a_jwt_placeholder_of_at_least_32_chars}
      ALLOWED_HOSTS: "*"
      # ── Facebook Grupos ──────────────────────────────────────
      FB_C_USER: "61590883850413"
      # FB_XS se usa SOLO para sembrar el perfil Playwright la primera vez.
      # El perfil persistente (volumen playwright_data) mantiene la sesión
      # entre reinicios. Si vence, auto-login con FB_EMAIL/FB_PASSWORD.
      FB_XS: "3%3A9mkLd1ZpcASyWw%3A2%3A1781349252%3A-1%3A-1%3A%3AAcxrGiDiRVI2wyWUwxNY-GsztphSlq-I9Xpl4VtKYw"
      FB_GROUP_IDS: "201845184579303,ventasmaldonado,2212495082337087,1968541760097413,321472601612190,204806649591265,168387704589456,363505744066395,1131084233586094,489698635745084,1997233177270740,286936385044509,499458854880203,1596515271245472,342712721039831,784352329635835,1205977434767195"
      # Credenciales para auto-login automático cuando la sesión de FB vence.
      FB_EMAIL: "trimarepropiedades@gmail.com"
      FB_PASSWORD: "donfengvigo2026"
      PLAYWRIGHT_DATA_DIR: "/app/playwright-data"
      # Telegram — alertas cuando auto-login falla o requiere 2FA.
      TELEGRAM_BOT_TOKEN: "8991528497:AAGrD4YksjRPGFkdk0sPJEZ_7tKjhkrFLFY"
      TELEGRAM_CHAT_ID: "1345306639"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      FB_DEPLOY_REV: "4"
    volumes:
      - playwright_data:/app/playwright-data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    # El lifespan de la app (app/main.py) crea extensiones+tablas y siembra
    # admin+zonas de forma idempotente al arrancar — no hace falta seed en el command.
    command: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --timeout 120

  worker:
    build:
      context: ./backend
      target: production
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-proptech}:${POSTGRES_PASSWORD:-proptech123}@postgres:5432/${POSTGRES_DB:-proptech_pde}
      DATABASE_SYNC_URL: postgresql://${POSTGRES_USER:-proptech}:${POSTGRES_PASSWORD:-proptech123}@postgres:5432/${POSTGRES_DB:-proptech_pde}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/2
      SECRET_KEY: ${SECRET_KEY:-this_is_a_placeholder_of_at_least_32_chars_x}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-this_is_a_jwt_placeholder_of_at_least_32_chars}
      # Grupos de Facebook — mismo setup que api (comparten el mismo volumen de perfil)
      FB_C_USER: "61590883850413"
      FB_XS: "3%3A9mkLd1ZpcASyWw%3A2%3A1781349252%3A-1%3A-1%3A%3AAcxrGiDiRVI2wyWUwxNY-GsztphSlq-I9Xpl4VtKYw"
      FB_GROUP_IDS: "201845184579303,ventasmaldonado,2212495082337087,1968541760097413,321472601612190,204806649591265,168387704589456,363505744066395,1131084233586094,489698635745084,1997233177270740,286936385044509,499458854880203,1596515271245472,342712721039831,784352329635835,1205977434767195"
      FB_EMAIL: "trimarepropiedades@gmail.com"
      FB_PASSWORD: "donfengvigo2026"
      PLAYWRIGHT_DATA_DIR: "/app/playwright-data"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      FB_DEPLOY_REV: "4"
      # Telegram
      TELEGRAM_BOT_TOKEN: "8991528497:AAGrD4YksjRPGFkdk0sPJEZ_7tKjhkrFLFY"
      TELEGRAM_CHAT_ID: "1345306639"
      PUBLIC_BASE_URL: "https://dynamiclabsai.com"
      DIGEST_WINDOW_HOURS: "24"
    volumes:
      - playwright_data:/app/playwright-data
    depends_on:
      - api
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2 -Q scraping,ai,notifications,default

  # Scheduler propio (independiente de celery beat). Un único proceso que dispara
  # los scrapes en-proceso por la misma ruta confiable que /scraping/trigger.
  # Resuelve que el beat dejó de disparar las tareas programadas en prod.
  scheduler:
    build:
      context: ./backend
      target: production
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-proptech}:${POSTGRES_PASSWORD:-proptech123}@postgres:5432/${POSTGRES_DB:-proptech_pde}
      DATABASE_SYNC_URL: postgresql://${POSTGRES_USER:-proptech}:${POSTGRES_PASSWORD:-proptech123}@postgres:5432/${POSTGRES_DB:-proptech_pde}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/2
      SECRET_KEY: ${SECRET_KEY:-this_is_a_placeholder_of_at_least_32_chars_x}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-this_is_a_jwt_placeholder_of_at_least_32_chars}
      # Grupos de Facebook — mismo setup que worker (comparten el volumen de perfil)
      FB_C_USER: "61590883850413"
      FB_XS: "3%3A9mkLd1ZpcASyWw%3A2%3A1781349252%3A-1%3A-1%3A%3AAcxrGiDiRVI2wyWUwxNY-GsztphSlq-I9Xpl4VtKYw"
      FB_GROUP_IDS: "201845184579303,ventasmaldonado,2212495082337087,1968541760097413,321472601612190,204806649591265,168387704589456,363505744066395,1131084233586094,489698635745084,1997233177270740,286936385044509,499458854880203,1596515271245472,342712721039831,784352329635835,1205977434767195"
      FB_EMAIL: "trimarepropiedades@gmail.com"
      FB_PASSWORD: "donfengvigo2026"
      PLAYWRIGHT_DATA_DIR: "/app/playwright-data"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      FB_DEPLOY_REV: "5"
      TELEGRAM_BOT_TOKEN: "8991528497:AAGrD4YksjRPGFkdk0sPJEZ_7tKjhkrFLFY"
      TELEGRAM_CHAT_ID: "1345306639"
    volumes:
      - playwright_data:/app/playwright-data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: python -m app.scheduler

  beat:
    build:
      context: ./backend
      target: production
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-proptech}:${POSTGRES_PASSWORD:-proptech123}@postgres:5432/${POSTGRES_DB:-proptech_pde}
      DATABASE_SYNC_URL: postgresql://${POSTGRES_USER:-proptech}:${POSTGRES_PASSWORD:-proptech123}@postgres:5432/${POSTGRES_DB:-proptech_pde}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/2
      SECRET_KEY: ${SECRET_KEY:-this_is_a_placeholder_of_at_least_32_chars_x}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-this_is_a_jwt_placeholder_of_at_least_32_chars}
    depends_on:
      - redis
    command: celery -A app.workers.celery_app beat --loglevel=info --scheduler redbeat.RedBeatScheduler

  # ⬇️ Este es el servicio al que Easypanel le asigna el DOMINIO (puerto 3000)
  frontend:
    build:
      context: ./frontend
      target: production
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # El navegador usa rutas relativas; Next proxea /api/v1 → api:8000
      BACKEND_INTERNAL_URL: http://api:8000
      NEXT_PUBLIC_API_URL: ""
    depends_on:
      - api
    # Usa el CMD del Dockerfile (node server.js — Next standalone)

volumes:
  postgres_data:
  redis_data:
  playwright_data:
