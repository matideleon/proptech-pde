name: Remote Scrape (properties + FB groups)

on:
  schedule:
    # 08:00 y 20:00 UTC (05:00 y 17:00 Uruguay) — solo propiedades.
    # Los grupos se disparan a mano (necesitan cookie de FB vigente).
    - cron: "0 8,20 * * *"
  workflow_dispatch:
    inputs:
      sources:
        description: "Property sources (space-separated). Vaciar para solo-grupos."
        required: false
        default: "facebook gallito"
      all_sources:
        description: "Scrape ALL property sources (mercadolibre + infocasas)"
        type: boolean
        required: false
        default: false
      scrape_groups:
        description: "Scrapear grupos de Facebook (requiere FB_C_USER/FB_XS/FB_GROUP_IDS)"
        type: boolean
        required: false
        default: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements-verified.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements-verified.txt
          # Deps de scrapers que no están en verified:
          #  - cloudscraper: Gallito (bypass Cloudflare)
          #  - playwright: scraper de grupos de FB
          pip install cloudscraper==1.2.71 playwright==1.41.2

      - name: Install Chromium (solo si se scrapean grupos)
        if: ${{ github.event.inputs.scrape_groups == 'true' }}
        run: python -m playwright install --with-deps chromium

      - name: Run scrapers & push to prod
        env:
          PROD_URL: ${{ secrets.PROD_URL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASS: ${{ secrets.ADMIN_PASS }}
          # Sesión de Facebook para el scraper de grupos (privados).
          FB_C_USER: ${{ secrets.FB_C_USER }}
          FB_XS: ${{ secrets.FB_XS }}
          FB_GROUP_IDS: ${{ secrets.FB_GROUP_IDS }}
          # El scraper de grupos importa app.models → crea el engine async,
          # así que el driver debe ser async aunque la DB no se use (push vía API).
          DATABASE_URL: "sqlite+aiosqlite:///tmp/dummy.db"
          SECRET_KEY: "github-actions-runner-placeholder-32chars-ok"
          OPENAI_API_KEY: "unused"
        run: |
          SOURCES="${{ github.event.inputs.sources }}"
          ALL="${{ github.event.inputs.all_sources }}"
          GROUPS="${{ github.event.inputs.scrape_groups }}"

          # Default para corridas por cron (sin inputs): TODAS las fuentes de
          # propiedades. ML + InfoCasas funcionan desde cualquier IP; Facebook y
          # Gallito solo desde IP limpia (la del runner), por eso GH Actions las
          # cubre. Los grupos quedan fuera del cron (cookie de FB vive en prod).
          if [ -z "$SOURCES" ] && [ "$ALL" != "true" ] && [ "$GROUPS" != "true" ]; then
            SOURCES="mercadolibre infocasas facebook gallito"
          fi

          if [ "$ALL" = "true" ]; then
            CMD="--all"
          elif [ -n "$SOURCES" ]; then
            CMD="--sources $SOURCES"
          else
            CMD=""
          fi

          if [ "$GROUPS" = "true" ]; then
            if [ -z "$CMD" ]; then
              CMD="--only-groups"
            else
              CMD="$CMD --groups"
            fi
          fi

          echo "Ejecutando: remote_scrape.py $CMD"
          python scripts/remote_scrape.py $CMD

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Scraping job failed. Check logs above."
